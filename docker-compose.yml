services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pg_blog
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://blog:blog_password@postgres:5432/pg_blog?sslmode=disable
      REDIS_ADDR: redis:6379
      APP_ADDR: :8080
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pg_data:
  redis_data:
